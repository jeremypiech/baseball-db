version: 2

models:
  - name: stg_retrosheet_discrepancies
    description: Statistical discrepancies.
    columns:
      - name: discrepancy_id
        description: Retrosheet discrepancy ID.

      - name: player_id
        description: Retrosheet player ID.

      - name: season
        description: Season (year).

      - name: game_id
        description: Retrosheet game ID.

      - name: team_id
        description: Retrosheet team ID.

      - name: related_discrepancy_id
        description: Discrepancy ID of any related discrepancy.

      - name: discrepancy_type
        description: Dicrepancy type (O - batting, D - defense, P - pitching).

      - name: discrepancy_code
        description: >
          Code of the discrepancy - possible values are:
          SWAP - stats were (perhaps partially) swapped between players
          IMP - batter has an impossible batting line (H > AB, Ks > AB - H, and so on)
          COL - stat put in wrong column for player
          COPY - the number was apparently copied incorrectly from the player dailies.
          DUP - two players were at the same position in a game and one position had
          no players
          ADD - apparent addition error on sheets
          OPP - a mismatch between one team's hitting and the other team's pitching
          statistics
          PAA - an unexplained anomaly in a team's plate appearances by batting order
          10.18 - run charged to incorrect pitcher per 10.18(g)

      - name: field_pos
        description: Position abbreviation if it's a defensive discrepancy.

      - name: stat_type
        description: Statistic of the discrepancy.

      - name: retrosheet_value
        description: Retrosheet value.

      - name: official_value
        description: Official value.

      - name: notes
        description: Notes on the discrepancy.

      - name: is_accepted
        description: Indicates whether discrepancy has been accepted and is now part of the official record.
