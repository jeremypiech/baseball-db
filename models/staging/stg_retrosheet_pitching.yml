version: 2

models:
  - name: stg_retrosheet_pitching
    description: >
      Individual player pitching statistics at the game level from Retrosheet. One row per
      pitcher per game appearance. The stattype column indicates whether values are standard,
      official, or bounded estimates.
    columns:
      - name: unique_key
        description: "Combination of the game ID, player ID, team ID, stat type, and appearance sequence."
        data_tests:
          - unique
          - not_null

      - name: game_id
        description: Retrosheet game ID.

      - name: player_id
        description: Retrosheet player ID.

      - name: team_id
        description: Retrosheet team ID.

      - name: stat_type
        description: >
          Indicates the nature of the statistics row. 'value' = standard computed stats;
          'official' = identifies discrepancies between Retrosheet accounts and official statistics;
          'lower' = lower bound estimate to highlight data uncertainty;
          'upper' = upper bound estimate to highlight data uncertainty.

      - name: app_seq
        description: >
          The sequence order in which the pitcher appeared in the game.
          1 = starter; 2 = second pitcher of the game, etc.

      - name: game_date
        description: Date of the game.

      - name: date_game_number
        description: Game number for the date.

      - name: game_type
        description: Type of game (e.g., regular-season, exhibition, post-season).

      - name: opp_team_id
        description: Retrosheet team ID of the opponent.

      - name: park_id
        description: Retrosheet Park ID indicating the location of the game.

      - name: outs_recorded
        description: Outs recorded by the pitcher, expressed as innings pitched multiplied by 3.

      - name: no_out_inning_bf
        description: Batters faced by the pitcher in any innings in which no outs were recorded.

      - name: bf
        description: Total batters faced by the pitcher.

      - name: h
        description: Hits allowed.

      - name: d
        description: Doubles allowed.

      - name: t
        description: Triples allowed.

      - name: hr
        description: Home runs allowed.

      - name: r
        description: Runs allowed.

      - name: er
        description: Earned runs allowed.

      - name: bb
        description: Walks allowed (including intentional).

      - name: ibb
        description: Intentional walks allowed.

      - name: k
        description: Strikeouts recorded.

      - name: hbp
        description: Batters hit by pitch.

      - name: wp
        description: Wild pitches.

      - name: bk
        description: Balks.

      - name: sh
        description: Sacrifice hits allowed.

      - name: sf
        description: Sacrifice flies allowed.

      - name: sb
        description: Stolen bases allowed.

      - name: cs
        description: Opposing baserunners caught stealing.

      - name: pb
        description: Passed balls allowed (catcher, attributed to pitching game context).

      - name: w
        description: Indicates whether the pitcher was the winning pitcher of the game.

      - name: l
        description: Indicates whether the pitcher was the losing pitcher of the game.

      - name: sv
        description: Indicates whether the pitcher earned a save.

      - name: is_gs
        description: Indicates whether the pitcher started the game (game started).

      - name: is_gf
        description: Indicates whether the pitcher finished the game in relief (game finished).

      - name: is_cg
        description: Indicates whether the pitcher threw a complete game.

      - name: team_win
        description: Equal to 1 if the team won the game.

      - name: team_loss
        description: Equal to 1 if the team lost the game.

      - name: team_tie
        description: Equal to 1 if the game ended in a tie.

      - name: vis_home
        description: Indicates whether the team was the visiting or home team.

      - name: has_box_score
        description: Indicates whether a box score is available.

      - name: pbp_source
        description: >
          Indicates whether a play-by-play account is available. d = deduced account;
          y = play-by-play account from a newspaper or scorecard. Blank indicates no account.
