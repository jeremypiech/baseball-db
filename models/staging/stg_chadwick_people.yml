version: 2

models:
  - name: stg_chadwick_people
    columns:
      - name: chadwick_unique_id
        description: The primary key. This is guaranteed not to be re-used to label a different identity.
        data_tests:
          - unique
          - not_null

      - name: chadwick_person_id
        description: >
          The first eight (hex) digits of the key_uuid. It is guaranteed that this is unique at any
          given time. However, over time the same short key may be re-used for a different identity.

      - name: retrosheet_id
        description: The person's Retrosheet ID.

      - name: mlbam_id
        description: The person's ID at MLBAM.

      - name: bbref_id
        description: The person's ID on major league pages on baseball-reference.com.

      - name: bbref_minors_id
        description: The person's ID on minor league pages on baseball-reference.com.

      - name: fangraphs_id
        description: The person's ID on fangraphs.com.

      - name: npb_id
        description: The person’s ID on the NPB official site, npb.or.jp.

      - name: sr_nfl_id
        description: The person's ID on pro-football-reference.com.

      - name: sr_nba_id
        description: The person's ID on basketball-reference.com.

      - name: sr_nhl_id
        description: The person's ID on hockey-reference.com.

      - name: wikidata_id
        description: The person's ID on wikidata.org.

      - name: first_name
        description: The person's first name.

      - name: last_name
        description: The person's last name.

      - name: given_name
        description: The person's given name.

      - name: suffix_name
        description: The person's suffix, if applicable.

      - name: matrilineal_name
        description: The person's matrilineal name.

      - name: nickname
        description: The person's nickname.

      - name: birth_year
        description: The person's birth year.

      - name: birth_month
        description: The person's birth month.

      - name: birth_day
        description: The person's birth day.

      - name: death_year
        description: The person's death year.

      - name: death_month
        description: The person's death month.

      - name: death_day
        description: The person's death day.

      - name: pro_played_first_season
        description: The person's first year of playing pro. 

      - name: pro_played_last_season
        description: The person's last year of playing pro. 

      - name: mlb_played_first_season
        description: The person's first year of playing in MLB. 

      - name: mlb_played_last_season
        description: The person's last year of playing in MLB. 

      - name: col_played_first_season
        description: The person's first year of playing college. 

      - name: col_played_last_season
        description: The person's last year of playing college. 

      - name: pro_managed_first_season
        description: The person's first year of managing pro. 

      - name: pro_managed_last_season
        description: The person's last year of managing pro. 

      - name: mlb_managed_first_season
        description: The person's first year of managing in MLB. 

      - name: mlb_managed_last_season
        description: The person's last year of managing in MLB. 

      - name: col_managed_first_season
        description: The person's first year of managing college. 

      - name: col_managed_last_season
        description: The person's last year of managing college. 

      - name: pro_umpired_first_season
        description: The person's first year of umpiring pro. 

      - name: pro_umpired_last_season
        description: The person's last year of umpiring pro. 

      - name: mlb_umpired_first_season
        description: The person's first year of umpiring in MLB. 

      - name: mlb_umpired_last_season
        description: The person's last year of umpiring in MLB. 
